<script>
        // ==========================================
        // CẤU HÌNH CÔNG THỨC LINK CỦA BẠN TẠI ĐÂY
        // ==========================================
        var URL_PREFIX = "https://pull.niues.live/live/stream-";
        var URL_SUFFIX = "_lhd.m3u8";

        // LINK JSON
        var sourceUrl = 'https://pub-26bab83910ab4b5781549d12d2f0ef6f.r2.dev/hoiquan.json';
        
        var listScreen = document.getElementById('list-screen');
        var playerScreen = document.getElementById('player-screen');
        var channelsContainer = document.getElementById('channels-container');
        var statusText = document.getElementById('status-text');
        
        var video = document.getElementById('tv-screen');
        var videoSource = document.getElementById('video-source');

        function fetchChannels() {
            // Đã bỏ tham số ?t=... để tránh bị máy chủ R2 chặn gây lỗi mạng
            fetch(sourceUrl)
                .then(function(response) {
                    if (!response.ok) throw new Error('Lỗi mạng');
                    return response.json(); 
                })
                .then(function(data) { 
                    processData(data); 
                })
                .catch(function(error) {
                    // Nếu vẫn lỗi mạng khi xem trên web, có thể do trình duyệt PC chặn CORS. 
                    // Trên TV thường sẽ không bị lỗi này.
                    statusText.innerHTML = '<span style="color:red">Lỗi tải danh sách JSON.</span>';
                    console.error("Lỗi Fetch:", error);
                });
        }

        function processData(data) {
            var htmlOutput = '';
            var count = 0;

            try {
                if (data && data.groups) {
                    for (var i = 0; i < data.groups.length; i++) {
                        var group = data.groups[i];
                        
                        if (group.channels) {
                            for (var j = 0; j < group.channels.length; j++) {
                                var channel = group.channels[j];
                                
                                // Lấy chính xác Tên trận + Giờ (Đã có sẵn trong JSON)
                                var streamName = channel.name || "Trận đấu không tên";
                                var streamUrl = "";

                                // Đào an toàn, kiểm tra từng lớp để không làm đứng TV cũ
                                if (channel.sources && channel.sources.length > 0) {
                                    var source = channel.sources[0];
                                    if (source.contents && source.contents.length > 0) {
                                        var content = source.contents[0];
                                        if (content.streams && content.streams.length > 0) {
                                            var stream = content.streams[0];
                                            if (stream.stream_links && stream.stream_links.length > 0) {
                                                
                                                // Lấy link đầu tiên mặc định
                                                streamUrl = stream.stream_links[0].url;
                                                
                                                // Nếu có link báo default: true thì ưu tiên lấy
                                                for (var k = 0; k < stream.stream_links.length; k++) {
                                                    if (stream.stream_links[k].default === true) {
                                                        streamUrl = stream.stream_links[k].url;
                                                        break;
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }

                                // Nếu tìm được link m3u8 thì mới in ra màn hình
                                if (streamUrl) {
                                    htmlOutput += '<div class="channel-box" tabindex="0" onclick="playChannel(\'' + streamUrl + '\')" onkeypress="if(event.keyCode==13) playChannel(\'' + streamUrl + '\')">' + streamName + '</div>';
                                    count++;
                                }
                            }
                        }
                    }
                }
            } catch (e) {
                console.error("Lỗi bóc tách JSON:", e);
            }

            if (count > 0) {
                statusText.innerHTML = '<span style="color:orange">Đã tải ' + count + ' luồng phát</span>';
                statusText.style.textAlign = 'left';
                channelsContainer.innerHTML = htmlOutput;
            } else {
                statusText.innerHTML = '<span style="color:yellow">Không có luồng phát nào hôm nay.</span>';
            }
        }

        // --- PHẦN PHÁT VIDEO GIỮ NGUYÊN ---
        function playChannel(streamUrl) {
            listScreen.style.display = 'none';
            playerScreen.style.display = 'block';

            videoSource.src = "";
            video.removeAttribute('src'); 

            if (streamUrl.indexOf('.m3u8') === -1) {
                var match = streamUrl.match(/(\d{5,8})/);
                if (match) {
                    var id = match[1];
                    streamUrl = URL_PREFIX + id + URL_SUFFIX;
                }
            }

            videoSource.src = streamUrl;
            video.load();
            
            var playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(function(error) { console.log("Cần tự bấm Play."); });
            }
        }

        function stopPlayer() {
            video.pause();
            videoSource.src = "";
            video.removeAttribute('src');
            video.load();
            playerScreen.style.display = 'none';
            listScreen.style.display = 'block';
        }

        window.addEventListener('keydown', function(e) {
            if (playerScreen.style.display === 'block') {
                if (e.keyCode === 27 || e.keyCode === 8 || e.keyCode === 10009) {
                    e.preventDefault();
                    stopPlayer();
                }
            }
        });

        video.addEventListener('error', function() {
            if (playerScreen.style.display === 'block') {
                setTimeout(function() {
                    video.load();
                    video.play();
                }, 5000);
            }
        }, true);

        fetchChannels();
    </script>
