<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Siêu Nhẹ</title>
    <style>
        body { background: #000; color: #fff; margin: 0; font-family: sans-serif; overflow-x: hidden; }
        
        #list-screen { padding: 10px; padding-bottom: 50px; }
        .channel-box { background: #222; margin-bottom: 12px; padding: 18px; font-size: 22px; border-radius: 8px; cursor: pointer; border-left: 6px solid #e50914; transition: 0.2s; }
        .channel-box:active, .channel-box:focus { background: #555; outline: 3px solid #fff; }
        
        #player-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
    </style>
</head>
<body>

    <div id="list-screen">
        <h2 id="status-text" style="text-align:center; color: #00ff00;">Đang tải dữ liệu...</h2>
        <div id="channels-container"></div>
    </div>

    <div id="player-screen">
        <video id="tv-screen" controls playsinline autoplay>
            <source id="video-source" src="" type="application/x-mpegURL">
            Trình duyệt TV của bạn quá cũ.
        </video>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH CÔNG THỨC LINK
        // ==========================================
        var URL_PREFIX = "https://pull.niues.live/live/stream-";
        var URL_SUFFIX = "_lhd.m3u8";

        // Vượt rào CORS (Dùng Proxy AllOrigins cho Github Pages)
        var originalUrl = 'https://pub-26bab83910ab4b5781549d12d2f0ef6f.r2.dev/hoiquan.json?t=' + new Date().getTime();
        var sourceUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(originalUrl);
        
        var listScreen = document.getElementById('list-screen');
        var playerScreen = document.getElementById('player-screen');
        var channelsContainer = document.getElementById('channels-container');
        var statusText = document.getElementById('status-text');
        
        var video = document.getElementById('tv-screen');
        var videoSource = document.getElementById('video-source');

        function fetchChannels() {
            fetch(sourceUrl)
                .then(function(response) {
                    if (!response.ok) throw new Error(response.status);
                    return response.json(); 
                })
                .then(function(data) { processData(data); })
                .catch(function(error) {
                    statusText.innerHTML = '<span style="color:red">Lỗi mạng, vui lòng thử lại.</span>';
                });
        }

        // THUẬT TOÁN TỐI ƯU SIÊU NHẸ CHO TV RAM THẤP
        function processData(data) {
            var htmlOutput = '';
            var count = 0;
            var groups = data.groups;

            // Nếu không có dữ liệu thì dừng luôn, đỡ tốn sức TV
            if (!groups) {
                statusText.innerHTML = '<span style="color:yellow">Dữ liệu trống.</span>';
                return;
            }

            // Ghi nhớ độ dài mảng để vòng lặp chạy nhanh nhất có thể
            for (var i = 0, gLen = groups.length; i < gLen; i++) {
                var channels = groups[i].channels;
                if (!channels) continue;

                for (var j = 0, cLen = channels.length; j < cLen; j++) {
                    var c = channels[j];
                    var streamUrl = "";

                    // Đào sâu lấy link m3u8 bằng if (Nhanh hơn try-catch rất nhiều trên TV cũ)
                    var sources = c.sources;
                    if (sources && sources.length > 0) {
                        var contents = sources[0].contents;
                        if (contents && contents.length > 0) {
                            var streams = contents[0].streams;
                            if (streams && streams.length > 0) {
                                var links = streams[0].stream_links;
                                if (links && links.length > 0) {
                                    
                                    streamUrl = links[0].url; // Mặc định link 1
                                    
                                    for (var k = 0, lLen = links.length; k < lLen; k++) {
                                        if (links[k].default === true) {
                                            streamUrl = links[k].url;
                                            break;
                                        }
                                    }
                                }
                            }
                        }
                    }

                    if (streamUrl) {
                        var streamName = c.name || "Kênh " + (count + 1);
                        htmlOutput += '<div class="channel-box" tabindex="0" onclick="playChannel(\'' + streamUrl + '\')" onkeypress="if(event.keyCode==13) playChannel(\'' + streamUrl + '\')">' + streamName + '</div>';
                        count++;
                    }
                }
            }

            // Ép TV kết xuất HTML 1 lần duy nhất để không giật lag
            channelsContainer.innerHTML = htmlOutput;
            
            // XÓA SẠCH DỮ LIỆU JSON KHỎI RAM NGAY LẬP TỨC
            data = null;
            groups = null;

            if (count > 0) {
                statusText.innerHTML = '<span style="color:orange">Đã tải ' + count + ' luồng phát</span>';
                statusText.style.textAlign = 'left';
            } else {
                statusText.innerHTML = '<span style="color:yellow">Không có luồng phát nào.</span>';
            }
        }

        // ==========================================
        // PHẦN PHÁT VIDEO GIỮ NGUYÊN 100% CỦA BẠN
        // ==========================================
        function playChannel(streamUrl) {
            listScreen.style.display = 'none';
            playerScreen.style.display = 'block';

            videoSource.src = "";
            video.removeAttribute('src'); 

            if (streamUrl.indexOf('.m3u8') === -1) {
                var match = streamUrl.match(/(\d{5,8})/);
                if (match) {
                    var id = match[1];
                    streamUrl = URL_PREFIX + id + URL_SUFFIX;
                }
            }

            videoSource.src = streamUrl;
            video.load();
            var playPromise = video.play();
            if (playPromise !== undefined) { playPromise.catch(function(e) {}); }
        }

        function stopPlayer() {
            video.pause();
            videoSource.src = "";
            video.removeAttribute('src');
            video.load();
            playerScreen.style.display = 'none';
            listScreen.style.display = 'block';
        }

        window.addEventListener('keydown', function(e) {
            if (playerScreen.style.display === 'block') {
                if (e.keyCode === 27 || e.keyCode === 8 || e.keyCode === 10009) {
                    e.preventDefault();
                    stopPlayer();
                }
            }
        });

        video.addEventListener('error', function() {
            if (playerScreen.style.display === 'block') {
                setTimeout(function() { video.load(); video.play(); }, 5000);
            }
        }, true);

        fetchChannels();
    </script>
</body>
</html>
